<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Canada Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>PC Canada Builder</h1>
    <div>
        <h2>CPU</h2>
        <input type="text" id="cpu-search" placeholder="Search for CPU...">
        <div id="cpu-list"></div>
        <h2>GPU</h2>
        <input type="text" id="gpu-search" placeholder="Search for GPU...">
        <div id="gpu-list"></div>
        <h2>RAM</h2>
        <input type="text" id="ram-search" placeholder="Search for RAM...">
        <div id="ram-list"></div>
        <h2>Storage</h2>
        <input type="text" id="storage-search" placeholder="Search for Storage...">
        <div id="storage-list"></div>
        <h2>Motherboard</h2>
        <input type="text" id="motherboard-search" placeholder="Search for Motherboard...">
        <div id="motherboard-list"></div>
        <h2>PSU</h2>
        <input type="text" id="psu-search" placeholder="Search for PSU...">
        <div id="psu-list"></div>
        <h2>Case</h2>
        <input type="text" id="case-search" placeholder="Search for Case...">
        <div id="case-list"></div>
        <h2>Cooling</h2>
        <input type="text" id="cooling-search" placeholder="Search for Cooling...">
        <div id="cooling-list"></div>
        <h2>Peripherals</h2>
        <input type="text" id="peripherals-search" placeholder="Search for Peripherals...">
        <div id="peripherals-list"></div>
        <h2>Fans</h2>
        <input type="text" id="fans-search" placeholder="Search for Fans...">
        <div id="fans-list"></div>
    </div>
    <div id="build-summary">
        <h2>Build Summary</h2>
        <div id="summary-details"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
